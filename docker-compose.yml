version: '3.8'

services:
  api:
    build: .
    container_name: insurance_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./sample_runs:/app/sample_runs
    environment:
      - PYTHONUNBUFFERED=1
    command: python3 -m uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
